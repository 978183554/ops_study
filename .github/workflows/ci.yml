name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 下载代码到虚拟机
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 步骤 2: 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      # 步骤 3: 代码质量检查
      - name: Run go vet
        run: go vet ./...
      
      # 步骤 4: 编译检查
      - name: Build
        run: go build -o app .
      
      # 步骤 5: 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # 步骤 6: 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 步骤 7: 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/yunwei:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/yunwei:latest