apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my.fullname" . }}-alertmanager-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my.labels" . | nindent 4 }}
data:
  config.yml: |
    global:
      resolve_timeout: 5m
      # 邮件通知配置
      smtp_smarthost: 'smtp.qq.com:587'
      smtp_auth_username: '978183554@qq.com'
      smtp_auth_password: 'nbgwniiujmqpbcbb'
      smtp_require_tls: true
      # 邮件来源地址
      smtp_from: '{{ include "my.fullname" . }}-alert@qq.com'
    
    # 告警路由规则
    route:
      receiver: 'email'
      group_by: ['alertname', 'instance']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      
      # 紧急告警路由（severity: critical）
      routes:
      - match:
          severity: critical
        receiver: 'email-critical'
        repeat_interval: 30m
      
      # 警告告警路由（severity: warning）
      - match:
          severity: warning
        receiver: 'email'
        repeat_interval: 4h
    
    receivers:
    # 邮件通知（普通告警）
    - name: 'email'
      email_configs:
      - to: '978183554@qq.com'
        headers:
          Subject: '[{{ .GroupLabels.alertname }}] 告警通知'
        html: |
          {{ range .Alerts }}
          <h3>{{ .Labels.alertname }}</h3>
          <p>严重程度: {{ .Labels.severity }}</p>
          <p>{{ .Annotations.summary }}</p>
          <p>{{ .Annotations.description }}</p>
          <p>时间: {{ .StartsAt }}</p>
          {{ end }}
        send_resolved: true
    
    # 邮件通知（紧急告警）
    - name: 'email-critical'
      email_configs:
      - to: '978183554@qq.com'
        headers:
          Subject: '[紧急] {{ .GroupLabels.alertname }} 告警'
        html: |
          {{ range .Alerts }}
          <h2 style="color: red;">{{ .Labels.alertname }}</h2>
          <p><strong>严重程度: {{ .Labels.severity }}</strong></p>
          <p>{{ .Annotations.summary }}</p>
          <p>{{ .Annotations.description }}</p>
          <p>时间: {{ .StartsAt }}</p>
          {{ end }}
        send_resolved: true
    
    # 禁用告警（可选）
    inhibit_rules:
    # 如果实例已经down了，就不再报告单个告警
    - source_match:
        severity: 'critical'
        alertname: 'AppDown'
      target_match:
        severity: 'warning'
      equal: ['instance']
