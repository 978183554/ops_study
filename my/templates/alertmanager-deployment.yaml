apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my.fullname" . }}-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my.labels" . | nindent 4 }}
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "my.selectorLabels" . | nindent 6 }}
      app: alertmanager
  template:
    metadata:
      labels:
        {{- include "my.selectorLabels" . | nindent 8 }}
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager
        args:
          - '--config.file=/etc/alertmanager/config.yml'
          - '--storage.path=/alertmanager'
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: {{ include "my.fullname" . }}-alertmanager-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "my.fullname" . }}-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my.labels" . | nindent 4 }}
    app: alertmanager
spec:
  type: ClusterIP
  ports:
  - port: 9093
    targetPort: 9093
    protocol: TCP
    name: http
  selector:
    {{- include "my.selectorLabels" . | nindent 4 }}
    app: alertmanager
